name: Django CI pipline #name of the pipeline
on: #trigger
  push:
    branches:       #automatic trigger
      - master
  workflow_dispatch: #manual trigger

jobs:
  test: #name of the job u can name it anything u want 
    runs-on: ubuntu-latest #runner --> machine where my pipeline will run 
    strategy:
      matrix:
        python-version: [3.9,3.10]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3   #download the code 
      - name: setup python  
        uses: action/setup-python@v4 #install the python
        with:
          python-version: $ {{matrix.python-version}}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: run migration #setup the database
        run: |
          puthon manage.py migrate
      - name: run server check #run server and tests response
        run: |
          python manage.py ruserver & 
          sleep 5
          curl http://127.0.0.8000 || echo "server failed"

